# GT7 AI Coach configuration.
#
# Copy this file to config.yaml and edit it for your setup:
#     cp config.example.yaml config.yaml
#
# config.yaml is gitignored, so your settings (and your PS5's IP) stay local.
# Anything you leave out falls back to the built-in defaults.

# Your PlayStation's IP address on your local network.
ps5_ip: "192.168.1.248"

# Anthropic model used to generate the coaching.
model: "claude-opus-4-5"

# Cue timing.
cue:
  lead_time: 2.5          # seconds before a corner a cue should finish landing
  fallback_duration: 3.5  # assumed cue length when it can't be measured
  max_per_lap: 3          # across both halves combined
  next_n_corners: 2       # only ever cue this many corners ahead

# Telemetry ports (rarely need changing).
ports:
  send: 33739             # heartbeat port the PS5 listens on
  recv: 33740             # port the telemetry stream arrives on

# Crash detection.
crash:
  min_speed_mph: 37       # only treat a sudden drop as a crash above this speed
  drop_mph: 50            # speed drop within ~1s that counts as a crash
  cooldown_s: 15          # don't re-trigger a crash check within this window

# Track learning. The circuit is learned from your opening lap and saved to
# `dir`; you rarely need to touch these. Nudge them if corner detection misses
# tight corners (lower prominence) or invents corners on a bumpy straight (raise
# prominence / separation).
track:
  dir: "tracks"                   # where learned circuits are saved
  corner_radius: 40               # how close (m) counts as "in" a corner
  sector_radius: 50               # sector-gate trigger radius (m)
  min_corner_separation_m: 40     # merge apexes closer together than this
  speed_smooth_window: 15         # telemetry packets averaged when finding corners
  min_corner_prominence_mph: 8    # smallest speed dip that counts as a corner
  match_length_tol: 0.08          # lap-length tolerance when recognising a track
  match_extent_tol: 0.10          # track-size tolerance when recognising a track
